<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Страница не найдена | Тир Пуля</title>
    <meta name="robots" content="noindex">
    <link rel="stylesheet" href="/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        .page-404 {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
            gap: 16px;
        }
        .page-404__code {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(100px, 20vw, 180px);
            color: #ff3333;
            line-height: 1;
            letter-spacing: 4px;
            text-shadow: 0 0 60px rgba(255,51,51,0.3);
        }
        .page-404__title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: clamp(22px, 4vw, 36px);
            color: #fff;
            letter-spacing: 2px;
        }
        .page-404__sub {
            font-size: 16px;
            color: #888;
            max-width: 380px;
            line-height: 1.6;
        }
        .page-404__actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 8px;
        }
        .page-404__bullet {
            font-size: 80px;
            opacity: 0.15;
            position: fixed;
            bottom: 60px;
            right: 60px;
            pointer-events: none;
            user-select: none;
        }
    </style>
</head>
<body>
    <div class="page-404">
        <div class="page-404__code">404</div>
        <div class="page-404__title">Страница не найдена</div>
        <p class="page-404__sub">Возможно, адрес был введён неверно или страница была удалена.</p>
        <div class="page-404__actions">
            <a href="/" class="btn btn-primary">На главную</a>
            <a href="/#booking" class="btn btn-secondary">Записаться в тир</a>
        </div>
    </div>
    <div class="page-404__bullet">🎯</div>
</body>
</html>
