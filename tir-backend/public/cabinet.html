<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет — Тир «Пуля» Белгород</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/img/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

<header>
    <div class="container">
        <a href="/" class="logo-link">
            <img src="/img/logo.png" alt="Логотип колледжа" class="college-logo">
            <h1 class="logo">
                <div class="logo-top">ПУЛЯ</div>
                <div class="logo-divider"></div>
                <div class="logo-bottom">СТРЕЛКОВЫЙ<br>ТИР</div>
            </h1>
        </a>
        <div class="header-actions">
            <a href="/#booking" class="btn btn-primary">Записаться</a>
            <button class="admin-logout-btn" id="btn-logout">Выйти</button>
        </div>
    </div>
</header>

<div class="cabinet-page">
    <div class="container">

        <div class="cabinet-header">
            <h1 class="cabinet-title">Личный кабинет</h1>
            <p class="cabinet-phone" id="cabinet-phone"></p>
        </div>

        <!-- Табы -->
        <div class="cabinet-tabs">
            <button class="cabinet-tab active" data-tab="upcoming">Предстоящие брони</button>
            <button class="cabinet-tab" data-tab="past">История</button>
        </div>

        <!-- Предстоящие брони -->
        <div id="cab-tab-upcoming" class="cabinet-tab-content active">
            <div id="upcoming-list" class="cabinet-list">
                <p class="cabinet-loading">Загрузка...</p>
            </div>
        </div>

        <!-- История -->
        <div id="cab-tab-past" class="cabinet-tab-content" style="display:none;">
            <div id="past-list" class="cabinet-list">
                <p class="cabinet-loading">Загрузка...</p>
            </div>
        </div>

    </div>
</div>

<!-- Модалка подтверждения отмены -->
<div id="cancel-modal" class="modal" style="display:none;">
    <div class="modal-content">
        <p id="cancel-modal-text"></p>
        <div class="modal-buttons">
            <button id="cancel-confirm" class="modal-btn confirm">Отменить бронь</button>
            <button id="cancel-dismiss" class="modal-btn cancel">Назад</button>
        </div>
    </div>
</div>

<footer>
    <div class="container">
        <p class="footer-text">© 2025 Тир «Пуля», г. Белгород, ул. Горького 61Б</p>
    </div>
</footer>

<script src="cabinet.js"></script>
</body>
</html>
