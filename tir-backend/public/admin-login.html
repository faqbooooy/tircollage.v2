<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в админ-панель - Тир Меткий Выстрел</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/img/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="container">
            <a href="/#hero" class="logo-link">
                <h1 class="logo">
                    <div class="logo-top">ПУЛЯ</div>
                    <div class="logo-bottom">стрелковый тир</div>
                </h1>
            </a>
        </div>
    </header>

    <section class="section">
        <div class="container">
            <h2 class="section-title">Вход в админ-панель</h2>
            <form id="login-form" class="booking-form">
                <input type="text" id="username" class="input" placeholder="Логин" required>
                <input type="password" id="password" class="input" placeholder="Пароль" required>
                <button type="submit" class="btn btn-primary submit-btn">Войти</button>
            </form>
        </div>
    </section>

    <div id="modal" class="modal">
        <div class="modal-content">
            <p id="modal-message"></p>
            <div class="modal-buttons">
                <button id="modal-confirm" class="modal-btn confirm" style="display:none;">Да</button>
                <button id="modal-cancel" class="modal-btn cancel">ОК</button>
            </div>
        </div>
    </div>

    <script src="admin-login.js"></script>
</body>
</html>
