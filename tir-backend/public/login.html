<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Стрелковый тир «Пуля»</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="/img/favicon.ico" type="image/x-icon">
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">

<div class="login-wrap">
    <div class="login-box">

        <!-- Логотип -->
        <a href="/" class="login-logo-link">
            <div class="login-logo">
                <span class="login-logo-top">ПУЛЯ</span>
                <span class="login-logo-bottom">стрелковый тир</span>
            </div>
        </a>

        <!-- Табы -->
        <div class="login-tabs">
            <button class="login-tab active" data-tab="user">Личный кабинет</button>
            <button class="login-tab" data-tab="admin">Персонал</button>
        </div>

        <!-- ТАБ: Личный кабинет -->
        <div id="tab-user" class="login-tab-content active">

            <!-- Шаг 1: ввод телефона -->
            <div id="step-phone">
                <p class="login-subtitle">Введите номер телефона</p>
                <input type="tel" id="user-phone" class="input" placeholder="+7 (___) ___-__-__" maxlength="18" autocomplete="tel">
                <button class="btn btn-primary login-btn" id="btn-check-phone">Продолжить</button>
            </div>

            <!-- Шаг 2a: вход (пин уже есть) -->
            <div id="step-login" style="display:none;">
                <p class="login-subtitle">Введите пин-код</p>
                <p class="login-phone-display" id="login-phone-display"></p>
                <div class="pin-input-wrap">
                    <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
                    <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
                    <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
                    <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
                </div>
                <button class="btn btn-primary login-btn" id="btn-login">Войти</button>
                <button class="login-back-btn" id="btn-back-login">← Изменить номер</button>
            </div>

            <!-- Шаг 2b: регистрация (пина ещё нет) -->
            <div id="step-register" style="display:none;">
                <p class="login-subtitle">Придумайте пин-код</p>
                <p class="login-phone-display" id="register-phone-display"></p>
                <p class="login-hint">4 цифры — вы будете использовать его при каждом входе</p>
                <div class="pin-input-wrap" id="pin-create-wrap">
                    <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
                    <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
                    <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
                    <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
                </div>
                <p class="login-hint" id="confirm-hint" style="display:none;">Повторите пин-код</p>
                <div class="pin-input-wrap" id="pin-confirm-wrap" style="display:none;">
                    <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
                    <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
                    <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
                    <input type="password" class="pin-digit" maxlength="1" inputmode="numeric" pattern="[0-9]">
                </div>
                <button class="btn btn-primary login-btn" id="btn-register" style="display:none;">Создать пин и войти</button>
                <button class="login-back-btn" id="btn-back-register">← Изменить номер</button>
            </div>

        </div>

        <!-- ТАБ: Персонал (админ) -->
        <div id="tab-admin" class="login-tab-content" style="display:none;">
            <p class="login-subtitle">Вход для персонала</p>
            <form id="admin-login-form" autocomplete="on">
                <input type="text" id="username" class="input" placeholder="Логин" autocomplete="username" required>
                <input type="password" id="password" class="input" placeholder="Пароль" autocomplete="current-password" required>
                <label class="remember-label">
                    <input type="checkbox" id="remember-me">
                    <span>Запомнить меня на 30 дней</span>
                </label>
                <button type="submit" class="btn btn-primary login-btn">Войти</button>
            </form>
        </div>

        <!-- Сообщение об ошибке -->
        <p class="login-error" id="login-error"></p>

    </div>
</div>

<script src="login.js"></script>
</body>
</html>
