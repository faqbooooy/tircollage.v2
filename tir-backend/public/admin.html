<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
</head>
<body>

<header class="admin-header">
    <a href="/" class="admin-back-btn">← На сайт</a>
    <h1>Админ-панель</h1>
</header>

<div class="tabs">
    <button class="tab-btn active" data-tab="bookings">Брони</button>
    <button class="tab-btn" data-tab="blocked">Запрещённые дни</button>
    <button class="tab-btn" data-tab="news-add">Добавить новость</button>
    <button class="tab-btn" data-tab="news-list-tab">Опубликованные новости</button>
    <button class="tab-btn" data-tab="reviews-tab">Отзывы</button>
</div>

<!-- БРОНИ -->
<div id="bookings" class="tab-content active">
    <h2 class="tab-title">Список броней</h2>
    <div class="bookings-layout">

        <!-- Левая часть: календарь -->
        <div class="bookings-calendar-col">
            <div class="cal-nav">
                <button id="cal-prev">&#8592;</button>
                <span id="cal-month-label"></span>
                <button id="cal-next">&#8594;</button>
            </div>
            <div class="cal-grid">
                <div class="cal-weekday">Пн</div>
                <div class="cal-weekday">Вт</div>
                <div class="cal-weekday">Ср</div>
                <div class="cal-weekday">Чт</div>
                <div class="cal-weekday">Пт</div>
                <div class="cal-weekday">Сб</div>
                <div class="cal-weekday">Вс</div>
                <div id="cal-days"></div>
            </div>
        </div>

        <!-- Правая часть: брони выбранного дня -->
        <div class="bookings-day-col">
            <div id="bookings-day-title" class="bookings-day-title">Выберите день</div>
            <div id="bookings-container"></div>
        </div>

    </div>
</div>

<!-- ЗАПРЕЩЁННЫЕ ДНИ -->
<div id="blocked" class="tab-content">
    <h2 class="tab-title">Запрещённые дни и время</h2>

    <div class="blocked-layout">

        <!-- Блок: весь день -->
        <div class="blocked-section">
            <h3 class="blocked-section-title">Весь день</h3>
            <form id="block-form">
                <input type="date" id="block-date" required>
                <button type="submit">Добавить</button>
            </form>
            <ul id="blocked-list"></ul>
        </div>

        <!-- Блок: временной диапазон -->
        <div class="blocked-section">
            <h3 class="blocked-section-title">Временной диапазон</h3>
            <form id="block-range-form">
                <input type="date" id="range-date" required>
                <div class="range-times">
                    <div class="range-time-field">
                        <label>С</label>
                        <input type="time" id="range-start" required step="3600">
                    </div>
                    <div class="range-time-field">
                        <label>До</label>
                        <input type="time" id="range-end" required step="3600">
                    </div>
                </div>
                <button type="submit">Добавить</button>
            </form>
            <ul id="blocked-ranges-list"></ul>
        </div>

    </div>
</div>

<!-- ДОБАВИТЬ НОВОСТЬ -->
<div id="news-add" class="tab-content">
    <h2 class="tab-title">Добавить новость</h2>
    <div class="news-editor-wrap">
        <form id="news-form">
            <input type="text" id="news-title" placeholder="Заголовок" required>
            <div id="editor"></div>
            <label class="file-label">
                <span id="file-label-text">📎 Прикрепить изображение</span>
                <input type="file" id="news-image" accept="image/*">
            </label>
            <div class="news-form-actions">
                <button type="button" id="news-preview-btn" class="btn-preview">👁 Превью</button>
                <button type="submit" id="news-submit">Опубликовать</button>
            </div>
        </form>
    </div>
</div>

<!-- МОДАЛКА ПРЕВЬЮ НОВОСТИ -->
<div id="news-preview-modal" class="news-preview-modal">
    <div class="news-preview-modal-content">
        <div class="news-preview-header">
            <span>Так будет выглядеть на сайте</span>
            <button id="news-preview-close">✕</button>
        </div>
        <div class="news-preview-body">
            <img id="preview-img" src="" alt="" class="preview-img" style="display:none;">
            <h2 id="preview-title" class="preview-title"></h2>
            <small id="preview-date" class="preview-date"></small>
            <div id="preview-body" class="preview-body"></div>
        </div>
    </div>
</div>

<!-- ОПУБЛИКОВАННЫЕ НОВОСТИ -->
<div id="news-list-tab" class="tab-content">
    <h2 class="tab-title">Опубликованные новости</h2>
    <div id="news-list"></div>
</div>

<!-- ОТЗЫВЫ -->
<div id="reviews-tab" class="tab-content">
    <h2 class="tab-title">Отзывы</h2>
    <div class="reviews-admin-layout">
        <div class="reviews-admin-col">
            <h3 class="reviews-admin-subtitle">На проверке</h3>
            <div id="reviews-pending"></div>
        </div>
        <div class="reviews-admin-col">
            <h3 class="reviews-admin-subtitle">Опубликованные</h3>
            <div id="reviews-approved"></div>
        </div>
    </div>
</div>

<script src="admin.js"></script>
</body>
</html>
